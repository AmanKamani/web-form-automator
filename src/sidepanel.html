<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Form Automator</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div class="container">
    <h1>Web Form Automator</h1>

    <!-- Input Mode Selector -->
    <section class="mode-section">
      <div class="mode-tabs">
        <button class="mode-tab active" data-mode="upload">Upload JSON</button>
        <button class="mode-tab" data-mode="template">Template</button>
        <button class="mode-tab" data-mode="flow">Flow</button>
      </div>
    </section>

    <!-- Upload mode -->
    <section id="modeUpload" class="mode-panel">
      <label for="jsonFile" class="file-label">
        <span id="fileNameDisplay">Choose JSON file...</span>
        <input type="file" id="jsonFile" accept=".json,application/json">
      </label>
    </section>

    <!-- Template mode -->
    <section id="modeTemplate" class="mode-panel hidden">
      <div class="select-with-link">
        <select id="templateSelect">
          <option value="">Select a template...</option>
        </select>
        <a id="templateConfigLink" class="config-link hidden" title="Open in configuration">&#x2197;</a>
      </div>
    </section>

    <!-- Flow mode -->
    <section id="modeFlow" class="mode-panel hidden">
      <div class="select-with-link">
        <select id="flowSelect">
          <option value="">Select a flow...</option>
        </select>
        <a id="flowConfigLink" class="config-link hidden" title="Open in configuration">&#x2197;</a>
      </div>
      <label for="flowDataFile" class="file-label flow-data-upload">
        <span id="flowFileNameDisplay">Upload data JSON (array of requests)...</span>
        <input type="file" id="flowDataFile" accept=".json,application/json">
      </label>
    </section>

    <div id="preview" class="preview hidden"></div>

    <!-- Progress display for batch runs -->
    <div id="progressDisplay" class="progress-display hidden">
      <div class="progress-bar-container">
        <div id="progressBar" class="progress-bar" style="width: 0%"></div>
      </div>
      <span id="progressText" class="progress-text">Request 0/0</span>
    </div>

    <section class="actions">
      <button id="runBtn" class="btn btn-primary" disabled>Run Automation</button>
      <button id="stopBtn" class="btn btn-stop hidden">Stop</button>
    </section>

    <section id="statusLog" class="status-log">
      <div class="log-header">
        <h2>Live Log</h2>
        <div class="log-header-actions">
          <label class="debug-toggle" title="Show detailed debug logs">
            <input type="checkbox" id="debugLogToggle">
            Debug
          </label>
          <button id="clearLogBtn" class="btn-clear" title="Clear log">Clear</button>
        </div>
      </div>
      <ul id="logList"></ul>
    </section>

    <footer class="quick-links">
      <a href="#" id="linkConfigTemplates">Configure Templates</a>
      <span class="link-sep">|</span>
      <a href="#" id="linkConfigFlows">Configure Flows</a>
    </footer>

  </div>

  <script src="storage-defaults.js"></script>
  <script src="schema.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
